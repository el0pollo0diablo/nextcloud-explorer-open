<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <title>Nextcloud Explorer Open</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>Nextcloud Explorer Open</h1>

      <section aria-labelledby="connectionTitle">
        <h2 id="connectionTitle">Windows-Verbindung</h2>
        <p id="status" role="status">Status wird geprueft...</p>

        <dl id="details" hidden>
          <div>
            <dt>Nextcloud</dt>
            <dd id="server">-</dd>
          </div>
          <div>
            <dt>Benutzer</dt>
            <dd id="username">-</dd>
          </div>
          <div>
            <dt>Windows-WebClient</dt>
            <dd id="service">-</dd>
          </div>
        </dl>

        <div class="actions">
          <button id="configure" type="button">Windows-Einrichtung oeffnen</button>
          <button id="refresh" type="button">Status aktualisieren</button>
        </div>

        <a
          id="installer"
          href="https://github.com/el0pollo0diablo/nextcloud-explorer-open/releases/download/v0.3.0/nextcloud-explorer-open-setup-0.3.0.exe"
          target="_blank"
          rel="noopener noreferrer"
          hidden>Windows-Installer herunterladen</a>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
